{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "node-llm-system.fullname" . }}-postgres
  labels:
    {{- include "node-llm-system.labels" . | nindent 4 }}
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "node-llm-system.selectorLabels" . | nindent 6 }}
      app: postgres
  template:
    metadata:
      labels:
        {{- include "node-llm-system.selectorLabels" . | nindent 8 }}
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          ports:
            - containerPort: {{ .Values.postgres.service.port }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.postgresDatabase | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.postgresUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "node-llm-system.fullname" . }}-secrets
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "node-llm-system.fullname" . }}-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "node-llm-system.fullname" . }}-postgres
  labels:
    {{- include "node-llm-system.labels" . | nindent 4 }}
    app: postgres
spec:
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.port }}
  selector:
    {{- include "node-llm-system.selectorLabels" . | nindent 4 }}
    app: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "node-llm-system.fullname" . }}-postgres-pvc
  labels:
    {{- include "node-llm-system.labels" . | nindent 4 }}
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
{{- end }}
