apiVersion: v1
kind: Secret
metadata:
  name: {{ include "node-llm-system.fullname" . }}-secrets
  labels:
    {{- include "node-llm-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://{{ .Values.postgres.postgresUser }}:$(POSTGRES_PASSWORD)@{{ include \"node-llm-system.fullname\" . }}-postgres:{{ .Values.postgres.service.port }}/{{ .Values.postgres.postgresDatabase }}"
  REDIS_URL: "redis://{{ include \"node-llm-system.fullname\" . }}-redis:{{ .Values.redis.service.port }}/0"
  OPENAI_API_KEY: "replace_me"
  SECRET_KEY: "your-secret-key-here"
  JWT_SECRET_KEY: "your-jwt-secret-key"
  postgres-password: "your-postgres-password"
